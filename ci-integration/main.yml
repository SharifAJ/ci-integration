name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run Linux commands
      run: |
        echo "Starting CI Pipeline"
        uname -a
        df -h
        free -m
        echo "Pipeline completed"